server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API reverse proxy ──────────────────────────────────
    # ${VITE_API_URL} and ${VITE_API_KEY} are substituted at container
    # start by nginx:alpine's built-in envsubst entrypoint.
    location /api/ {
        proxy_pass ${VITE_API_URL}/;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Key ${VITE_API_KEY};
        proxy_set_header Connection "";

        # SSL settings for HTTPS upstream (Railway uses SNI routing)
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        # DNS resolver for Railway domains
        resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;

        # No timeout — free LLM can take several minutes
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── SPA fallback ───────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ───────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
